<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마음의 편지 • QT Festival</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Comic+Neue:wght@700&display=swap');

        
        body {
            font-family: 'Noto Sans KR', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8f1e3 0%, #e8d9c0 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .poster {
            background: #f8f1e3;
            box-shadow: 0 20px 40px -10px rgb(92 70 52 / 0.4);
            border: 12px solid #5c4634;
        }
        
        .love-text {
            font-family: 'Comic Neue', cursive;
            font-size: 3.6rem;
            line-height: 1;
            font-weight: 700;
            background: linear-gradient(90deg, #f59e0b, #ef4444, #c026d3, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .team-btn {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 100%;
        }
        
        .team-btn:hover {
            transform: scale(1.08) rotate(2deg);
        }
        
        .team-image-container {
            width: 100%;
            flex: 1;
            background: #f8f1e3;
            border-radius: 16px;
            overflow: hidden;
            border: 6px solid #fff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .team-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .floating-heart {
            position: fixed;
            font-size: 2.9rem;
            z-index: 99999;
            pointer-events: none;
            user-select: none;
            animation: fallDown 5.8s forwards ease-in-out;
        }
        
        @keyframes fallDown {
            0% { opacity: 1; transform: translateY(-280px) scale(0.5) rotate(-20deg); }
            45% { transform: translateY(35vh) scale(1.12) rotate(18deg); }
            100% { opacity: 0; transform: translateY(110vh) scale(1.45) rotate(45deg); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-8px) rotate(-6deg); }
            75% { transform: translateX(8px) rotate(6deg); }
        }
        
        .animate-shake {
            animation: shake 0.7s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="max-w-[380px] mx-auto p-4 min-h-screen flex flex-col">
        <div class="poster rounded-3xl overflow-hidden flex-1 flex flex-col">
            <div class="bg-[#5c4634] text-amber-100 py-4 text-center font-bold text-lg tracking-widest">
                2026 SUMMER QT FESTIVAL
            </div>
            <div class="flex-1 flex flex-col pt-4 pb-4 px-4">
                <!-- Header -->
                <div class="text-center mb-4">
                    <div class="flex items-center justify-center gap-3">
                        <span class="text-5xl">💌</span>
                        <div class="love-text">10ve</div>
                        <span class="text-5xl">💌</span>
                    </div>
                    <div class="text-[#5c4634] text-2xl font-medium mt-1">
                        마음을 전하세요
                    </div>
                </div>
                
                <!-- Team Grid -->
                <div id="team-container" class="grid grid-cols-3 gap-4 flex-1">
                    <!-- JS populated -->
                </div>
                
                <!-- 10번 영역 (중앙 정렬) -->
                <div class="mt-6 flex justify-center">
                    <a href="https://naver.com" id="suggestion-link"
                       class="team-btn max-w-[340px] flex items-center gap-2 bg-white rounded-3xl shadow-md border border-[#d4b88a] p-1.5 hover:shadow-xl transition-all">
                        
                        <!-- 10번 이미지 -->
                        <div class="w-20 h-20 flex-shrink-0 bg-gradient-to-br from-red-500 to-orange-500 rounded-2xl p-1.5 border-4 border-white shadow-inner">
                            <img src="img_10.jpeg" alt="10" class="w-full h-full object-contain">
                        </div>
                        
                        <!-- 내용 영역 -->
                        <div class="flex-1 text-left flex flex-col justify-center min-h-[80px]">
                            <div class="mb-1 flex justify-center">
                                <span class="inline-block bg-[#5c4634] text-white text-[13px] font-bold tracking-widest px-6 py-0.5 rounded-full">
                                    큐페 피드백
                                </span>
                            </div>
                            <p class="text-[#5c4634] text-[12px] leading-relaxed font-medium">
                                다음 수련회를 위해 개선되었으면 하는 점이나
                                <span class="text-[#8b6f47] font-semibold">건의사항</span>이 있다면
                                자유롭게 남겨 주세요!
                            </p>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const teamData = [
            { id: 1, name: "사역자님", img: "img_01.jpeg", link: "https://naver.com"},
            { id: 2, name: "본부", img: "img_02.jpeg", link: "https://naver.com"},
            { id: 3, name: "진행", img: "img_03.jpeg", link: "https://naver.com" },
            { id: 4, name: "운영", img: "img_04.jpeg", link: "https://naver.com" },
            { id: 5, name: "헬퍼", img: "img_05.jpeg", link: "https://naver.com" },
            { id: 6, name: "프 1팀", img: "img_06.jpeg", link: "https://naver.com" },
            { id: 7, name: "프 2팀", img: "img_07.jpeg", link: "https://naver.com" },
            { id: 8, name: "디데미", img: "img_08.jpeg", link: "https://naver.com" },
            { id: 9, name: "찬양팀", img: "img_09.jpeg", link: "https://naver.com" }
        ];

        function createTeamButton(team) {
            const a = document.createElement('a');
            a.href = team.link;
            a.className = "team-btn flex flex-col items-center bg-white rounded-3xl py-3 px-1.5 shadow-md active:scale-95 w-full";
            
            a.innerHTML = `
                <div class="team-image-container">
                    <img src="${team.img}" alt="${team.name}" class="team-image">
                </div>
                <div class="text-[#5c4634] font-bold text-[15px] leading-tight text-center mt-2.5">${team.name}</div>
            `;
            return a;
        }

        function initTeams() {
            const container = document.getElementById('team-container');
            container.innerHTML = '';
            teamData.forEach(team => container.appendChild(createTeamButton(team)));
        }

        function createFloatingHeart() {
            const hearts = ['❤️','💖','💗','💘','💝','💞','🫶','💕','💓','✨'];
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            
            heart.style.left = `${Math.random() * 98}vw`;
            heart.style.animationDuration = `${Math.random() * 2.2 + 5.4}s`;
            heart.style.opacity = Math.random() * 0.65 + 0.8;
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }

        function triggerAnimation() {
            const buttons = document.querySelectorAll('.team-btn');
            const img10 = document.querySelector('#suggestion-link img');
            
            if (img10) {
                img10.classList.add('animate-shake');
                setTimeout(() => img10.classList.remove('animate-shake'), 900);
            }
            
            buttons.forEach((btn, i) => {
                setTimeout(() => {
                    btn.classList.add('animate-shake');
                    setTimeout(() => btn.classList.remove('animate-shake'), 800);
                }, i * 70);
            });
            
            for (let i = 0; i < 40; i++) {
                setTimeout(() => createFloatingHeart(), i * 42);
            }
        }

        window.onload = () => {
            initTeams();
        };
    </script>
</body>
</html>
